
    <div class="theme-switch-wrapper">
        <span class="mode-label">Dark Mode</span>
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" onchange="toggleTheme(event)" />
            <div class="slider"></div>
        </label>
    </div>

    <style>
        :root {
            --bg-color: #fdfdfd;
            --text-color: #333333;
            --header-color: #D80621;
            --border-color: #dddddd;
            --code-bg: #f4f4f4;
        }

        /* Dark Mode Colors */
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --header-color: #ff4d4d; /* Brighter red for dark background contrast */
            --border-color: #444444;
            --code-bg: #2d2d2d;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 40px 40px 40px; /* Space at top for the switch */
            transition: background-color 0.3s, color 0.3s;
        }

        h1, h2, h3 {
            font-family: 'Georgia', serif;
            color: var(--header-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        /* Keep bold text red for your Canadian code references */
        b, strong { color: #D80621; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid var(--border-color); padding: 10px; text-align: left; }
        code { background: var(--code-bg); padding: 2px 5px; border-radius: 4px; }

        /* --- TOGGLE SWITCH STYLING --- */
        .theme-switch-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            z-index: 1000;
            font-family: sans-serif;
            background: rgba(128, 128, 128, 0.1);
            padding: 8px 12px;
            border-radius: 30px;
        }
        .theme-switch {
            display: inline-block;
            height: 24px;
            position: relative;
            width: 50px;
            margin-left: 10px;
        }
        .theme-switch input { display: none; }
        .slider {
            background-color: #ccc;
            bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0;
            transition: .4s; border-radius: 24px;
        }
        .slider:before {
            background-color: #fff;
            bottom: 4px; content: ""; height: 16px; left: 4px; position: absolute;
            transition: .4s; width: 16px; border-radius: 50%;
        }
        input:checked + .slider { background-color: #D80621; }
        input:checked + .slider:before { transform: translateX(26px); }
        .mode-label { font-size: 12px; font-weight: bold; color: var(--text-color); }
    </style>

    <script>
        function toggleTheme(e) {
            if (e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }    
        }
    </script>
